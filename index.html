<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS game</title>
    <link rel="stylesheet" href="styleg.css"/>
</head>
<body>
    <h2 id="heading">Rock, Paper, Scissor</h2>

    <div class="containers">
        
        <div class="one"  id="Rock"> 
            <img class="two" id="r" src="images/Rock.jpeg">
        </div>

        <div class="one" id="Paper">
            <img class="two" id="p"  src="images/Paper.jpeg">
        </div>
        
        <div class="one" id="Scissor" >
            <img class="two" id="s" src="images/Scissor.jpeg">
        </div>
        
        
    </div>

    <!--scoreboard-->
    
<div class="scoreboard">
    <div id="user">
        <center>
            <div id="zero">
    <h4 id="score">0</h4>
</div>
    <p>User</p>
    
    </center>
</div>
<div>
    <center><img src="images/VS.png" style=" margin-left: 20px; margin-top: 2rem; width: 110px; height: 110px;"></center>
</div>
<div id="comp">
   <center>
    <div id="zero">
    <h4 id="scoreC">0</h4>
    </div>
    <p>Computer</p>
    </div>
</center>
</div>

<center>
<div id="result">
    <p id="msg"> Play your move</p>
</div>

<div>
<p id="choose" > Choice</p>
</div>
</center>


<script src="script.js"></script>
</body>
</html>
